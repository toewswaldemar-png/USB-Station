<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend-react</title>
    <script>
      try {
        var c = JSON.parse(localStorage.getItem('ui_accent') || 'null')
        if (c) {
          document.documentElement.style.setProperty('--accent', c.a)
          document.documentElement.style.setProperty('--accent-l', c.l)
          document.documentElement.style.setProperty('--accent-xl', c.xl)
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
